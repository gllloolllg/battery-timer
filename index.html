<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta name="theme-color" content="#3b3c40">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
  <title>Battery Timer</title>
  <style>
    :root {
      --bg: #0f1115;
      --text: #000000;
      --muted: #9aa3b2;
      --border: #262b36;
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
      --cap: #e2e2e2;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      /* テキスト選択不可 */
      -webkit-user-select: none;
      /* Safari向け選択拒否 */
    }

    input,
    textarea {
      user-select: auto;
      /* 入力欄は選択可能に戻す */
      -webkit-user-select: auto;
    }

    html,
    body {
      margin: 0;
      padding: 3% 0 0;
      height: 100%;
      background: url('back.png') center/cover no-repeat;
      background-attachment: fixed;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP";
      overflow: hidden;
      /* スクロール防止 */
      touch-action: none;
      /* ピンチズームやダブルタップズームを完全に防ぐ */
    }

    .score-btn {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 20;
      width: 50px;
      height: 50px;
      cursor: pointer;
      transition: filter 0.2s, opacity 0.2s;
    }

    .score-btn:hover {
      filter: brightness(1.1);
    }

    .score-btn.disabled {
      pointer-events: none;
      opacity: 0.5;
    }

    /* Battery Image Container */
    .battery-container {
      position: relative;
      margin: 5% auto 0;
      width: 90%;
      max-width: 500px;
      cursor: pointer;
      touch-action: manipulation;
    }

    .battery-image {
      display: block;
      width: 100%;
      height: auto;
      position: relative;
      z-index: 2;
      /* 画像をFillの手前に配置 (透過部分から背景のFillが見える) */
      pointer-events: none;
      /* クリックはコンテナで受け取る */
    }

    .fill-area {
      position: absolute;
      top: 27%;
      bottom: 21%;
      left: 15%;
      right: 15%;
      z-index: 1;
      /* 画像の裏側 */
      /* 背景を円筒の空洞のように見せるグラデーション */
      background: linear-gradient(90deg, #05070a 0%, #1a2233 20%, #2a364f 50%, #1a2233 80%, #05070a 100%);

      /* 円筒らしく上下を丸める */
      border-radius: 50% / 10px;
      /* 横幅に対する楕円の丸み（数値は調整してください）*/

      overflow: hidden;
      box-shadow: inset 0 10px 20px rgba(0, 0, 0, 0.8), inset 0 -10px 20px rgba(0, 0, 0, 0.8);
    }

    .fill {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      transition: height 160ms linear, background-color 160ms linear;

      /* 液体らしい立体感のグラデーション */
      background-image: linear-gradient(90deg, rgba(0, 0, 0, 0.6) 0%, rgba(255, 255, 255, 0.2) 30%, transparent 50%, rgba(0, 0, 0, 0.4) 100%);
      background-color: var(--green);

      /* 底面の丸みを持たせる（親要素に合わせて） */
      border-radius: 50% / 10px;
    }

    /* 液体の「上面」（水面）を表現するための擬似要素 */
    .fill::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 55px;
      /* 水面の楕円の高さ */
      margin-top: -10px;
      /* 高さの半分上にはみ出させる */
      border-radius: 50%;
      background: inherit;
      filter: brightness(1.3);
      /* 水面を少し明るくする */
      box-shadow: inset 0 -2px 5px rgba(0, 0, 0, 0.3), 0 2px 5px rgba(0, 0, 0, 0.2);
    }


    /* Danger Flashing Overlay */
    .danger-overlay {
      position: fixed;
      inset: 0;
      background-color: rgba(255, 0, 0, 0.4);
      /* 透明な赤色 */
      z-index: 10;
      pointer-events: none;
      display: none;
      /* 初期状態は非表示 */
      animation: flash 600ms infinite alternate;
    }

    @keyframes flash {
      0% {
        opacity: 0;
      }

      100% {
        opacity: 1;
      }
    }

    
    .hint {
      position: absolute;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      pointer-events: none;
    }

    #resetBtn {
      margin: 10% auto;
      width: 60%;
      background: repeating-linear-gradient(-45deg, #ffcc00, #ffcc00 20px, #000 20px, #000 40px);
      color: #fff;
      text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 0px 4px 0 #000;
      padding: 16px;
      font-size: 2.2rem;
      font-weight: 900;
      border: 4px solid #fff;
      border-radius: 12px;
      box-shadow: 0 8px 0 #333, 0 10px 20px rgba(0, 0, 0, 0.5);
      transition: transform 0.1s, box-shadow 0.1s;
      cursor: pointer;
    }

    #resetBtn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #333, 0 4px 10px rgba(0, 0, 0, 0.5);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 30;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .modal-backdrop.hide .modal {
      transform: translateY(-50%, 100%);
    }

    
    .modal-backdrop.show {
      opacity: 1;
      visibility: visible;
    }

    .modal-backdrop.show .modal {
      transform: translate(-50%, 0);
    }

    .modal {
      width: 115%;
      height: 95vh;
      /* 下にはみ出てもOKなので高めに設定 */
      background: url('menu.png') top center/100% auto no-repeat;
      padding: 23vw 27vw 6vw;
      /* 画像幅に合わせて左右の余白も少し増やす */
      border: none;
      border-radius: 0;
      box-shadow: none;
      position: absolute;
      bottom: 0;
      left: 50%;
      overflow-y: auto;
      transform: translate(-50%, 100%);
      transition: transform 220ms ease;
    }

    .modalclosebtn{
      background-color: rgba(0,0,0,0);
      border: none;
      position:absolute;
      top: 4vw;
      left: 93vw;
      height: 50px;
      width: 50px;
    }

    .player-area {
      min-height: 240px;
    }
    .players-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .player-row {
      display: grid;
      grid-template-columns: 1fr 30px 36px 30px;
      align-items: center;
    }

    .player-name {
      min-width: 0;
      border: none;
      background-color: rgba(0,0,0,0);
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .score-value {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .score-control,
    .triangle-btn {
      border: none;
      background: var(--cap);
      color: var(--text);
      border-radius: 10px;
      height: 30px;
      width: 30px;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
    }

    .add-player-btn {
      width: 100%;
      margin: 14px 0 0;
    }

    .seconds-setting {
      margin-top: 110px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .seconds-stepper {
      display: grid;
      grid-template-columns: 80px 30px 1fr 30px;
      gap: 10px;
      align-items: center;
    }

    .duration-value {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .game-reset-section {
      margin-top: 30px;
    }

    .game-reset-btn {
      width: 100%;
    }

    .modal h2 {
      margin: 0 0 20px;
      font-size: 18px;
      padding-left: 5vh;
    }

    .btn {
      border: none;
      background: var(--cap);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
    }

    .btn.primary {
      background: #d76868;
      color:white;
    }

  </style>
</head>

<body>
  <!-- Settings button -->
  <img src="score.png" class="score-btn" id="openSettings" alt="設定">

  <div class="danger-overlay" id="dangerOverlay"></div>

  <div class="battery-container" id="battery">
    <img src="battery.png" id="batteryImg" alt="Battery" class="battery-image">
    <div class="fill-area">
      <div class="fill" id="fill"></div>
      <!-- ←ここにJSで線を追加 -->
    </div>
  </div>

  <div class="reset-area" style="display:none; text-align:center;">
    <button id="resetBtn" class="btn primary">RESET</button>
  </div>

  <!-- Score Modal -->
  <div class="modal-backdrop" id="modal">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <button class="modalclosebtn" onclick="closeModal()"></button>
      <h2 id="settingsTitle">SCORE</h2>
      <div class="player-area">
        <div id="playersList" class="players-list"></div>
        <button id="addPlayerBtn" class="btn add-player-btn">+ Add Player</button>
      </div>

      <div class="seconds-setting">
        <div class="seconds-stepper">
          <div class="section-title">TIME</div>
          <button id="decreaseDurationBtn" class="triangle-btn" type="button">-</button>
          <div id="durationValue" class="duration-value">10</div>
          <button id="increaseDurationBtn" class="triangle-btn" type="button">+</button>
        </div>
      </div>

      <div class="game-reset-section">
        <button id="gameResetBtn" class="btn primary game-reset-btn">GAME RESET</button>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const STORAGE_KEY = 'battery_timer_duration_v1';
      const batteryEl = document.getElementById('battery');
      const batteryImg = document.getElementById('batteryImg');
      const fillEl = document.getElementById('fill');
      const dangerOverlay = document.getElementById('dangerOverlay');

      // Modal elems
      const modal = document.getElementById('modal');
      const openBtn = document.getElementById('openSettings');
      const playersList = document.getElementById('playersList');
      const addPlayerBtn = document.getElementById('addPlayerBtn');
      const decreaseDurationBtn = document.getElementById('decreaseDurationBtn');
      const increaseDurationBtn = document.getElementById('increaseDurationBtn');
      const durationValue = document.getElementById('durationValue');
      const gameResetBtn = document.getElementById('gameResetBtn');

      const resetArea = document.querySelector('.reset-area');
      const resetBtn = document.getElementById('resetBtn');


      // State
      let duration = Number(localStorage.getItem(STORAGE_KEY)) || 10;
      let remaining = duration;
      let timerId = null;
      let lastTick = null;
      const PLAYER_STORAGE_KEY = 'battery_timer_players_v1';
      const SCORE_STORAGE_KEY = 'battery_timer_scores_v1';
      const NAME_CANDIDATES = ['タロウ', 'ハナコ', 'イチロウ', 'ミンス', 'ジウン', 'ヨンホ',
       'ジヘ', 'ウェイ', 'ファン', 'チャン', 'ソムチャイ', 'ソムスィー', 'グエン', 'チュン',
        'リン', 'ジョン', 'マイケル', 'デビッド', 'ジェームズ', 'メアリー', 'ジェーン', 'リンダ',
         'エリザベス', 'ジャック', 'エマ', 'オリビア', 'ジャン', 'ピエール', 'マニー', 'モニク',
          'ハンス', 'ハインツ', 'ヘルムート', 'イングリット', 'ジョバンニ', 'マリオ', 'ジュゼッペ',
           'フランチェスカ', 'ホセ', 'フアン', 'マリア', 'カルメン', 'イワン', 'セルゲイ', 'タチアナ',
            'ナターシャ', 'ムハンマド', 'アフマド', 'アリ', 'ファティマ', 'ライラ', 'ザイナブ',
             'ジョアン', 'アナ', 'ルイス', 'アントニオ', 'グアダルーペ'];

      function loadPlayers() {
        const savedPlayers = JSON.parse(localStorage.getItem(PLAYER_STORAGE_KEY) || 'null');
        const savedScores = JSON.parse(localStorage.getItem(SCORE_STORAGE_KEY) || 'null');

        if (Array.isArray(savedPlayers) && savedPlayers.length >= 2) {
          return savedPlayers.slice(0, 6).map((name, i) => ({
            name,
            score: Array.isArray(savedScores) ? Number(savedScores[i] || 0) : 0
          }));
        }

        const name1 = NAME_CANDIDATES[Math.floor(Math.random() * NAME_CANDIDATES.length)];
        let name2;

        do {
          name2 = NAME_CANDIDATES[Math.floor(Math.random() * NAME_CANDIDATES.length)];
        } while (name2 === name1);

        return [
          { name: name1, score: 0 },
          { name: name2, score: 0 }
        ];
      }

      let players = loadPlayers();

      function savePlayers() {
        localStorage.setItem(PLAYER_STORAGE_KEY, JSON.stringify(players.map(p => p.name)));
        localStorage.setItem(SCORE_STORAGE_KEY, JSON.stringify(players.map(p => p.score)));
      }

      function getRandomUnusedName() {
        const used = players.map(p => p.name);
        const unused = NAME_CANDIDATES.filter(name => !used.includes(name));
        const pool = unused.length ? unused : NAME_CANDIDATES;
        return pool[Math.floor(Math.random() * pool.length)];
      }

      function renderPlayers() {
        playersList.innerHTML = '';

        players.forEach((player, index) => {
          const row = document.createElement('div');
          row.className = 'player-row';

          const nameBtn = document.createElement('button');
          nameBtn.type = 'button';
          nameBtn.className = 'player-name';
          nameBtn.textContent = player.name;
          nameBtn.addEventListener('click', () => {
            const newName = prompt('Player Name?', player.name);
            if (newName === null) return;
            const trimmed = newName.trim();
            if (!trimmed) return;
            players[index].name = trimmed;
            savePlayers();
            renderPlayers();
          });

          const minusBtn = document.createElement('button');
          minusBtn.type = 'button';
          minusBtn.className = 'score-control';
          minusBtn.textContent = '−';
          minusBtn.addEventListener('click', () => {
            players[index].score -= 1;
            savePlayers();
            renderPlayers();
          });

          const score = document.createElement('div');
          score.className = 'score-value';
          score.textContent = players[index].score;

          const plusBtn = document.createElement('button');
          plusBtn.type = 'button';
          plusBtn.className = 'score-control';
          plusBtn.textContent = '+';
          plusBtn.addEventListener('click', () => {
            players[index].score += 1;
            savePlayers();
            renderPlayers();
          });

          row.appendChild(nameBtn);
          row.appendChild(minusBtn);
          row.appendChild(score);
          row.appendChild(plusBtn);

          playersList.appendChild(row);
        });

        addPlayerBtn.style.display = players.length >= 6 ? 'none' : 'block';
      }

      function resetGameState() {
        const name1 = getRandomUnusedName();
        let name2;

        do {
          name2 = getRandomUnusedName();
        } while (name2 === name1);

        players = [
          { name: name1, score: 0 },
          { name: name2, score: 0 }
        ];
        savePlayers();
        renderPlayers();
      }

      // Audio
      const seStart = new Audio('se/start.mp3');
      const seCharge = new Audio('se/charge.mp3');
      const seEnd = new Audio('se/end.mp3');
      const seReset = new Audio('se/reset.mp3');
      const seMenu = new Audio('se/menu.mp3');

      function setColor(rem) {
        const ratio = rem / duration;
        if (ratio > 0.6) {
          fillEl.style.backgroundColor = getComputedStyle(document.documentElement).getPropertyValue('--green').trim();
        } else if (ratio > 0.3) {
          fillEl.style.backgroundColor = getComputedStyle(document.documentElement).getPropertyValue('--yellow').trim();
        } else {
          fillEl.style.backgroundColor = getComputedStyle(document.documentElement).getPropertyValue('--red').trim();
        }
      }

      function render() {
        const pct = Math.max(0, Math.min(1, remaining / duration));
        fillEl.style.height = (pct * 100) + '%';
        setColor(remaining);
      }

      function tick(now) {
        if (!lastTick) lastTick = now;
        const delta = (now - lastTick) / 1000;
        lastTick = now;

        remaining -= delta;
        if (remaining <= 0) {
          remaining = 0;
          render();
          stopTimer(); // 0でいったん停止（タップで再開）
          seEnd.currentTime = 0;
          seEnd.play().catch(e => console.error(e));
          enableBatteryTap(false);             // バッテリー操作を無効化
          resetArea.style.display = 'block';   // リセットボタンを表示
          batteryImg.src = "battery2.png";      // 0になったらbattery2.pngにする
          dangerOverlay.style.display = 'block'; // 赤い点滅を表示
          openBtn.classList.remove('disabled'); // 0になったタイミングで有効化
          return;
        }
        render();
        timerId = requestAnimationFrame(tick);
      }

      function startTimer() {
        if (timerId) return;
        lastTick = null;
        timerId = requestAnimationFrame(tick);
        openBtn.classList.add('disabled'); // タイマー作動中は無効化
      }
      function stopTimer() {
        if (timerId) cancelAnimationFrame(timerId);
        timerId = null;
      }
      function resetAndStart() {
        remaining = duration;

        // 戻る速度を1秒にするためにtransitionをオーバーライド
        fillEl.style.transition = 'height 1s cubic-bezier(0.25, 1, 0.5, 1), background-color 1s cubic-bezier(0.25, 1, 0.5, 1)';
        render();

        // アニメーション完了後（または適当なタイミング）で通常のtick用のtransitionに戻す
        setTimeout(() => {
          fillEl.style.transition = 'height 160ms linear, background-color 160ms linear';
        }, 1000);

        startTimer();
      }

      // Modal controls
      function openModal() {
        modal.classList.remove('hide');
        renderPlayers();
        updateDurationDisplay();
        modal.classList.add('show');
      }
      function closeModal() {
          modal.classList.remove('show');
      }
      window.closeModal = closeModal;

      renderPlayers();
      updateDurationDisplay();
      savePlayers();

      function updateDurationDisplay() {
        durationValue.textContent = duration;
      }

      remaining = duration;
      render();


      let batteryEnabled = true;

      function enableBatteryTap(flag) {
        batteryEnabled = flag;
        batteryEl.style.pointerEvents = flag ? 'auto' : 'none';
      }



      openBtn.addEventListener('click', () => {
        seMenu.currentTime = 0;
        seMenu.play().catch(e => console.error(e));
        openModal();
      });
      modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
      });

      addPlayerBtn.addEventListener('click', () => {
        if (players.length >= 6) return;
        players.push({ name: getRandomUnusedName(), score: 0 });
        savePlayers();
        renderPlayers();
      });

      decreaseDurationBtn.addEventListener('click', () => {
        duration = Math.max(1, duration - 1);
        localStorage.setItem(STORAGE_KEY, String(duration));
        remaining = duration;
        enableBatteryTap(true);
        updateDurationDisplay();
        render();
      });

      increaseDurationBtn.addEventListener('click', () => {
        duration = Math.min(3600, duration + 1);
        localStorage.setItem(STORAGE_KEY, String(duration));
        remaining = duration;
        enableBatteryTap(true);
        updateDurationDisplay();
        render();
      });

      gameResetBtn.addEventListener('click', () => {
        const ok = confirm('ゲームをリセットしますか？');
        if (!ok) return;

        resetGameState(); //プレイヤースコアリセット
        duration = 10;    // 2. 時間を10秒にリセット
        localStorage.setItem(STORAGE_KEY, String(duration)); // 保存
        remaining = duration;
        updateDurationDisplay(); // モーダル内の「10」を更新
        render();               // バッテリーの液量と数字を更新
      });

      // Interaction
      function handleBatteryTap() {
        // 1. まず「今、タイマーが動いているか」を timerId で判定
        const isRestarting = (timerId !== null);

        // 2. 鳴らす音を決める
        const targetSound = isRestarting ? seCharge : seStart;

        // 3. 【重要】一度ロードし直して、再生位置を0に戻す
        // これが「1回目」のロック解除と「2回目以降」の連続再生の両方に効きます
        targetSound.load(); 
        targetSound.currentTime = 0;

        // 4. 再生を実行
        targetSound.play().catch(e => {
          console.error("再生失敗:", e);
        });
        resetAndStart();
      }

      batteryEl.addEventListener('click', handleBatteryTap, { passive: true });
      batteryEl.addEventListener('touchstart', (e) => { e.preventDefault(); handleBatteryTap(); }, { passive: false });
      window.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); handleBatteryTap(); } });

      resetBtn.addEventListener('click', () => {
        resetArea.style.display = 'none'; // ボタン消す
        enableBatteryTap(true);           // バッテリータップ復活
        remaining = duration;
        batteryImg.src = "battery.png";   // リセット時（待機状態）もbattery.png
        dangerOverlay.style.display = 'none'; // 赤い点滅を消去
        openBtn.classList.remove('disabled'); // 待機状態に戻るので有効化

        fillEl.style.transition = 'height 1s cubic-bezier(0.25, 1, 0.5, 1), background-color 1s cubic-bezier(0.25, 1, 0.5, 1)';
        render();
        setTimeout(() => {
          fillEl.style.transition = 'height 160ms linear, background-color 160ms linear';
        }, 2000);

        seReset.currentTime = 0;
        seReset.play().catch(e => console.error(e));
      });

      // Init
      remaining = duration;
      batteryImg.src = "battery.png"; // 初期表示
      dangerOverlay.style.display = 'none'; // 初期状態は非表示
      render();
    })();
  </script>
</body>

</html>
